<body>
  <main class="box">
    <h1>Loading offer...</h1>
    <p>Please wait while the registration offer opens.</p>

    <div id="status" class="status">Locker is loading, please wait...</div>

    <button id="manualOpen" class="button" type="button">
      Open registration offer
    </button>

    <p class="small">
      Sponsored offer. Available for eligible users only. Not financial advice.
    </p>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const manualBtn = document.getElementById("manualOpen");

    let opened = false;

    function openLocker() {
      if (opened) return;

      if (typeof window._HJ === "function") {
        opened = true;
        console.log("Opening AdBlueMedia locker");
        statusEl.textContent = "Opening registration offer...";
        manualBtn.classList.remove("visible");
        window._HJ();
        return;
      }

      console.log("AdBlueMedia _HJ missing");
    }

    function showManualFallback() {
      if (!opened) {
        manualBtn.classList.add("visible");
        statusEl.textContent = "If the offer did not open, click the button below.";
      }
    }

    manualBtn.addEventListener("click", openLocker);

    let attempts = 0;
    const maxAttempts = 40;

    const poll = setInterval(() => {
      attempts++;

      if (typeof window._HJ === "function") {
        console.log("AdBlueMedia _HJ available");
        clearInterval(poll);
        openLocker();
        return;
      }

      if (window.__adblueScriptFailed) {
        clearInterval(poll);
        statusEl.textContent = "Locker failed to load. Please disable ad blocker or try another browser.";
        return;
      }

      if (attempts >= maxAttempts) {
        clearInterval(poll);
        console.error("AdBlueMedia failed to load");
        statusEl.textContent = "Locker failed to load. Please disable ad blocker or try another browser.";
        showManualFallback();
      }
    }, 250);

    setTimeout(showManualFallback, 2000);
  </script>
</body>
